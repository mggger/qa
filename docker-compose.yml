services:
  backend:
    build: ./backend
    container_name: questionnaire-backend
    restart: unless-stopped
    environment:
      - DATA_DIR=/data/submissions
    volumes:
      - ./submissions:/data/submissions
    networks:
      - app-net

  frontend:
    build: ./frontend
    container_name: questionnaire-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
